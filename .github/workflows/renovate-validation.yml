name: Renovate Config Validation

# ─────────────────────────────────────────────────────────────────────────────
# Workflow triggers
# ─────────────────────────────────────────────────────────────────────────────
on:
  pull_request:
    paths:
      - "renovate.json"
      - ".github/workflows/renovate-validation.yml"
  push:
    branches:
      - master
    paths:
      - "renovate.json"
  workflow_dispatch:

# ─────────────────────────────────────────────────────────────────────────────
# Concurrency control
# ─────────────────────────────────────────────────────────────────────────────
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# ─────────────────────────────────────────────────────────────────────────────
# Permissions (least privilege)
# ─────────────────────────────────────────────────────────────────────────────
permissions:
  contents: read

# ─────────────────────────────────────────────────────────────────────────────
# Jobs
# ─────────────────────────────────────────────────────────────────────────────
jobs:
  validate:
    name: Validate Renovate Config
    runs-on: ubuntu-24.04
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "lts/*"

      - name: Validate Renovate configuration
        run: |
          echo "::group::Validating renovate.json"
          npx --yes --package renovate@43.46.1 renovate-config-validator --strict
          echo "::endgroup::"

      - name: Generate summary
        if: always()
        run: |
          {
            echo "## Renovate Config Validation"
            echo ""
            echo "| Property | Value |"
            echo "|----------|-------|"
            echo "| **Status** | ${{ job.status == 'success' && '✅ Passed' || '❌ Failed' }} |"
            echo "| **Run ID** | \`${{ github.run_id }}\` |"
            echo "| **Ref** | \`${{ github.ref_name }}\` |"
            echo "| **SHA** | \`${{ github.sha }}\` |"
            echo "| **Triggered by** | ${{ github.actor }} |"
          } >> "$GITHUB_STEP_SUMMARY"
