# Lefthook Configuration
# https://lefthook.dev/configuration/

min_version: 2.0.13

output:
  - execution_out
  - failure
  - summary
  - success

skip_lfs: true

# ═══════════════════════════════════════════════════════════════════════════════
# Pre-commit: Fast parallel checks on staged files
# ═══════════════════════════════════════════════════════════════════════════════

pre-commit:
  parallel: true
  jobs:
    - name: format
      glob: "*.{ts,tsx,js,jsx,json,jsonc,css,scss,md,mdx,toml,yml,yaml}"
      run: bunx ultracite fix {staged_files}
      stage_fixed: true

    - name: typecheck
      glob: "*.{ts,tsx}"
      run: bun run typecheck

    - name: test
      glob: "*.{ts,tsx}"
      run: bun test --bail
      skip:
        - merge
        - rebase

# ═══════════════════════════════════════════════════════════════════════════════
# Commit message validation
# ═══════════════════════════════════════════════════════════════════════════════

commit-msg:
  jobs:
    - name: commitlint
      run: bunx commitlint --edit {1}

# ═══════════════════════════════════════════════════════════════════════════════
# Pre-push: Full quality gate
# ═══════════════════════════════════════════════════════════════════════════════

pre-push:
  parallel: true
  jobs:
    - name: typecheck
      run: bun run typecheck

    - name: test
      run: bun run test

    - name: lint
      run: bunx ultracite check

# ═══════════════════════════════════════════════════════════════════════════════
# Post-merge: Auto-install deps when lockfile changes
# ═══════════════════════════════════════════════════════════════════════════════

post-merge:
  jobs:
    - name: install
      glob: "{bun.lock,bun.lockb,package.json}"
      run: bun install
